<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .game-wrapper {
            background: #16213e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #e8e8e8;
            font-size: 16px;
        }
        .game-header div {
            background: #0f3460;
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid #e94560;
        }
        .game-header span { color: #e94560; font-weight: bold; }
        canvas {
            display: block;
            border: 2px solid #e94560;
            border-radius: 8px;
            background: #000;
        }
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 12px;
        }
        .game-footer button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .game-footer button:hover { background: #c73652; transform: scale(1.03); }
        .controls-info {
            color: #aaa;
            font-size: 13px;
        }
        .controls-info kbd {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #333;
            font-size: 12px;
            color: #e8e8e8;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div>🏆 得分: <span id="scoreDisplay">0</span></div>
        <div>💀 命: <span id="livesDisplay">3</span></div>
        <div>👾 剩余: <span id="enemiesDisplay">20</span></div>
        <div>🎯 关卡: <span id="levelDisplay">1</span></div>
    </div>
    <canvas id="gameCanvas" width="780" height="780"></canvas>
    <div class="game-footer">
        <div class="controls-info">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动 &nbsp;|&nbsp; <kbd>空格</kbd> 射击 &nbsp;|&nbsp; <kbd>P</kbd> 暂停
        </div>
        <button id="restartBtn">重新开始</button>
    </div>
</div>

<script>
// ==================== 游戏配置 ====================
const TILE_SIZE = 30;
const COLS = 26;
const ROWS = 26;
const W = COLS * TILE_SIZE;
const H = ROWS * TILE_SIZE;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');
const livesSpan = document.getElementById('livesDisplay');
const enemiesSpan = document.getElementById('enemiesDisplay');
const levelSpan = document.getElementById('levelDisplay');

// ==================== 工具函数 ====================
function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

function tileRect(col, row) {
    return { x: col * TILE_SIZE, y: row * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE };
}

// ==================== 地图生成 ====================
const TILE_EMPTY = 0;
const TILE_BRICK = 1;
const TILE_STEEL = 2;
const TILE_WATER = 3;
const TILE_TREE  = 4;

function buildMap(level) {
    // 生成随机但具有可玩性的地图
    const map = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

    // 外圈 - 给基地留出入口
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
                map[r][c] = TILE_STEEL;
            }
        }
    }
    // 基地入口
    map[ROWS - 1][11] = TILE_EMPTY;
    map[ROWS - 1][12] = TILE_EMPTY;
    map[ROWS - 1][13] = TILE_EMPTY;
    map[ROWS - 1][14] = TILE_EMPTY;
    map[ROWS - 2][11] = TILE_EMPTY;
    map[ROWS - 2][14] = TILE_EMPTY;

    // 砖块墙体 (随机分布)
    const brickCount = 40 + level * 8;
    for (let i = 0; i < Math.min(brickCount, 120); i++) {
        let c = 2 + Math.floor(Math.random() * (COLS - 4));
        let r = 2 + Math.floor(Math.random() * (ROWS - 6));
        // 保护基地周围留空
        if (r >= ROWS - 6 && c >= 10 && c <= 15) continue;
        // 保护出生点
        if (r <= 3 && c <= 3) continue;
        if (r <= 3 && c >= COLS - 4) continue;
        // 2x2 砖块簇
        if (c < COLS - 1 && r < ROWS - 1) {
            map[r][c] = TILE_BRICK;
            map[r][c + 1] = TILE_BRICK;
            map[r + 1][c] = TILE_BRICK;
            map[r + 1][c + 1] = TILE_BRICK;
        }
    }

    // 钢墙 (少量)
    const steelCount = 3 + Math.floor(level / 3);
    for (let i = 0; i < steelCount; i++) {
        let c = 3 + Math.floor(Math.random() * (COLS - 6));
        let r = 3 + Math.floor(Math.random() * (ROWS - 8));
        if (r >= ROWS - 6 && c >= 9 && c <= 16) continue;
        map[r][c] = TILE_STEEL;
    }

    // 水域 (少量)
    const waterCount = 2 + Math.floor(level / 2);
    for (let i = 0; i < Math.min(waterCount, 6); i++) {
        let c = 3 + Math.floor(Math.random() * (COLS - 8));
        let r = 5 + Math.floor(Math.random() * (ROWS - 10));
        if (r >= ROWS - 6 && c >= 9 && c <= 16) continue;
        if (c < COLS - 1 && r < ROWS - 1) {
            map[r][c] = TILE_WATER;
            map[r][c + 1] = TILE_WATER;
            map[r + 1][c] = TILE_WATER;
            map[r + 1][c + 1] = TILE_WATER;
        }
    }

    // 基地 (鹰旗) 在底部中央
    map[ROWS - 1][12] = TILE_STEEL;
    map[ROWS - 1][13] = TILE_STEEL;

    return map;
}

// ==================== 游戏状态 ====================
const DIR = { UP: 0, DOWN: 1, LEFT: 2, RIGHT: 3 };
const DIR_VEC = [
    { dx: 0, dy: -1 },
    { dx: 0, dy: 1 },
    { dx: -1, dy: 0 },
    { dx: 1, dy: 0 }
];

const TANK_SIZE = 28;

let game = {};

function initGame() {
    game = {
        map: buildMap(1),
        level: 1,
        score: 0,
        lives: 3,
        totalEnemies: 20,
        enemiesSpawned: 0,
        enemiesKilled: 0,
        player: null,
        enemies: [],
        bullets: [],
        particles: [],
        spawnTimer: 0,
        spawnInterval: 180,
        gameOver: false,
        paused: false,
        win: false,
        frame: 0
    };
    game.player = createPlayer();
    spawnEnemyWave();
}

// ==================== 坦克 ====================
function createTank(x, y, dir, isPlayer) {
    return {
        x, y, w: TANK_SIZE, h: TANK_SIZE,
        dir: dir,
        speed: isPlayer ? 2 : 1.2,
        hp: isPlayer ? 1 : 1,
        isPlayer: isPlayer,
        shootCooldown: 0,
        shootDelay: isPlayer ? 15 : 40,
        moveTimer: 0,
        moveDelay: isPlayer ? 0 : (60 + Math.random() * 80),
        alive: true,
        flash: 0,
        color: isPlayer ? '#f5c842' : '#e94560'
    };
}

function createPlayer() {
    return createTank(9 * TILE_SIZE, (ROWS - 3) * TILE_SIZE, DIR.UP, true);
}

function playerRespawn() {
    game.player = createPlayer();
    game.lives--;
    if (game.lives < 0) {
        game.gameOver = true;
    }
    updateUI();
}

// ==================== 子弹 ====================
function fireBullet(tank) {
    if (game.gameOver) return;
    // 从坦克炮管口发射
    const cx = tank.x + tank.w / 2 - 3;
    const cy = tank.y + tank.h / 2 - 3;
    const vec = DIR_VEC[tank.dir];
    const bx = cx + vec.dx * (tank.w / 2 + 2);
    const by = cy + vec.dy * (tank.h / 2 + 2);
    game.bullets.push({
        x: bx, y: by, w: 6, h: 6,
        dir: tank.dir,
        speed: 4,
        alive: true,
        isPlayer: tank.isPlayer
    });
}

// ==================== 粒子特效 ====================
function spawnExplosion(x, y, color, count) {
    for (let i = 0; i < (count || 16); i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 30,
            maxLife: 60,
            color: color || '#ff6600',
            size: 2 + Math.random() * 4
        });
    }
}

// ==================== 敌人AI ====================
function updateEnemyAI(enemy) {
    if (enemy.shootCooldown > 0) enemy.shootCooldown--;
    if (enemy.moveTimer > 0) { enemy.moveTimer--; return; }

    // 随机改变方向
    if (Math.random() < 0.15) {
        enemy.dir = Math.floor(Math.random() * 4);
    }

    // 偶尔朝玩家方向
    if (game.player && game.player.alive && Math.random() < 0.08) {
        const dx = game.player.x - enemy.x;
        const dy = game.player.y - enemy.y;
        if (Math.abs(dx) > Math.abs(dy)) {
            enemy.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
            enemy.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        }
    }

    // 移动
    const vec = DIR_VEC[enemy.dir];
    const newX = enemy.x + vec.dx * enemy.speed;
    const newY = enemy.y + vec.dy * enemy.speed;
    const moved = tryMove(enemy, newX, newY);
    if (!moved) {
        enemy.dir = Math.floor(Math.random() * 4);
    }

    // 射击
    if (enemy.shootCooldown <= 0) {
        // 有概率射击
        const shouldShoot = Math.random() < 0.12 || (game.player && game.player.alive && aimAtPlayer(enemy));
        if (shouldShoot) {
            fireBullet(enemy);
            enemy.shootCooldown = enemy.shootDelay;
        }
    }

    enemy.moveTimer = enemy.moveDelay;
}

function aimAtPlayer(enemy) {
    if (!game.player || !game.player.alive) return false;
    const dx = game.player.x - enemy.x;
    const dy = game.player.y - enemy.y;
    const threshold = TILE_SIZE * 1.5;
    if (enemy.dir === DIR.UP && dy < 0 && Math.abs(dx) < threshold) return true;
    if (enemy.dir === DIR.DOWN && dy > 0 && Math.abs(dx) < threshold) return true;
    if (enemy.dir === DIR.LEFT && dx < 0 && Math.abs(dy) < threshold) return true;
    if (enemy.dir === DIR.RIGHT && dx > 0 && Math.abs(dy) < threshold) return true;
    return false;
}

// ==================== 碰撞检测与移动 ====================
function isTileSolid(tile) {
    return tile === TILE_BRICK || tile === TILE_STEEL || tile === TILE_WATER;
}

function getTile(col, row) {
    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return TILE_STEEL;
    return game.map[row][col];
}

function canMoveTo(rect, ignoreEnemy) {
    // 边界检查
    if (rect.x < 0 || rect.x + rect.w > W || rect.y < 0 || rect.y + rect.h > H) return false;

    // 瓦片碰撞
    const startCol = Math.floor(rect.x / TILE_SIZE);
    const endCol = Math.floor((rect.x + rect.w - 1) / TILE_SIZE);
    const startRow = Math.floor(rect.y / TILE_SIZE);
    const endRow = Math.floor((rect.y + rect.h - 1) / TILE_SIZE);

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            if (isTileSolid(getTile(c, r))) return false;
            // 基地 (鹰旗) —— (ROWS-1, 12-13)
            if (r === ROWS - 1 && (c === 12 || c === 13)) return false;
        }
    }

    // 坦克碰撞
    const tanks = game.player && game.player.alive ? [game.player, ...game.enemies] : [...game.enemies];
    for (let t of tanks) {
        if (ignoreEnemy && t === ignoreEnemy) continue;
        if (t === rect) continue;
        if (t.alive && rectCollide(rect, t)) return false;
    }

    return true;
}

function tryMove(tank, newX, newY) {
    const alignedX = Math.round(newX / 0.5) * 0.5;
    const alignedY = Math.round(newY / 0.5) * 0.5;
    const testRect = { x: alignedX, y: alignedY, w: tank.w, h: tank.h };
    if (canMoveTo(testRect, tank)) {
        tank.x = alignedX;
        tank.y = alignedY;
        return true;
    }

    // 尝试只在一个轴上移动 (沿墙滑动)
    const testX = { x: alignedX, y: tank.y, w: tank.w, h: tank.h };
    if (canMoveTo(testX, tank)) {
        tank.x = alignedX;
        return true;
    }
    const testY = { x: tank.x, y: alignedY, w: tank.w, h: tank.h };
    if (canMoveTo(testY, tank)) {
        tank.y = alignedY;
        return true;
    }
    return false;
}

// ==================== 生成敌人 ====================
function spawnEnemyWave() {
    if (game.enemiesSpawned >= game.totalEnemies) return;
    if (game.enemies.length >= 4) return;

    const spawnPoints = [
        { x: 1 * TILE_SIZE, y: 1 * TILE_SIZE },
        { x: 12 * TILE_SIZE, y: 1 * TILE_SIZE },
        { x: (COLS - 3) * TILE_SIZE, y: 1 * TILE_SIZE }
    ];

    for (let sp of spawnPoints) {
        if (game.enemies.length >= 4) break;
        if (game.enemiesSpawned >= game.totalEnemies) break;
        // 检查出生点是否被占据
        const testRect = { x: sp.x, y: sp.y, w: TANK_SIZE, h: TANK_SIZE };
        let blocked = false;
        // 只检查已有的敌人
        for (let e of game.enemies) {
            if (e.alive && rectCollide(testRect, e)) { blocked = true; break; }
        }
        // 还要避免与玩家重叠
        if (!blocked && game.player && game.player.alive && rectCollide(testRect, game.player)) {
            blocked = true;
        }
        if (!blocked) {
            const enemy = createTank(sp.x, sp.y, DIR.DOWN, false);
            enemy.hp = 1 + Math.floor(game.level / 3);
            if (game.level >= 5) enemy.speed = 1.5;
            game.enemies.push(enemy);
            game.enemiesSpawned++;
            spawnExplosion(sp.x + TILE_SIZE/2, sp.y + TILE_SIZE/2, '#ffffff', 8);
        }
    }
}

// ==================== 更新逻辑 ====================
function update() {
    if (game.gameOver || game.paused || game.win) return;
    game.frame++;

    // 玩家移动
    const p = game.player;
    if (p && p.alive) {
        if (p.shootCooldown > 0) p.shootCooldown--;
        // 输入处理在键盘事件中
    }

    // 敌人AI
    for (let e of game.enemies) {
        if (e.alive) updateEnemyAI(e);
    }

    // 子弹更新
    for (let b of game.bullets) {
        if (!b.alive) continue;
        const vec = DIR_VEC[b.dir];
        b.x += vec.dx * b.speed;
        b.y += vec.dy * b.speed;

        // 出界
        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
            b.alive = false;
            continue;
        }

        // 瓦片碰撞
        const col = Math.floor((b.x + b.w/2) / TILE_SIZE);
        const row = Math.floor((b.y + b.h/2) / TILE_SIZE);
        const tile = getTile(col, row);
        if (tile === TILE_BRICK) {
            b.alive = false;
            game.map[row][col] = TILE_EMPTY;
            // 2x2区域破坏效果
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = row + dr, nc = col + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && game.map[nr][nc] === TILE_BRICK) {
                        if (Math.random() < 0.4) game.map[nr][nc] = TILE_EMPTY;
                    }
                }
            }
            spawnExplosion(b.x + 3, b.y + 3, '#ffaa44', 8);
            continue;
        }
        if (tile === TILE_STEEL) {
            b.alive = false;
            spawnExplosion(b.x + 3, b.y + 3, '#ffffff', 6);
            continue;
        }

        // 命中坦克
        let hit = false;
        // 玩家子弹打敌人
        if (b.isPlayer) {
            for (let e of game.enemies) {
                if (!e.alive) continue;
                if (rectCollide(b, e)) {
                    b.alive = false;
                    e.hp--;
                    if (e.hp <= 0) {
                        e.alive = false;
                        game.score += (10 + game.level * 5);
                        game.enemiesKilled++;
                        spawnExplosion(e.x + e.w/2, e.y + e.h/2, '#ff4400', 25);
                    } else {
                        spawnExplosion(b.x + 3, b.y + 3, '#ffaa00', 6);
                    }
                    hit = true;
                    break;
                }
            }
        } else {
            // 敌人子弹打玩家
            if (p && p.alive && rectCollide(b, p)) {
                b.alive = false;
                p.alive = false;
                spawnExplosion(p.x + p.w/2, p.y + p.h/2, '#f5c842', 30);
                setTimeout(() => {
                    if (!game.gameOver) playerRespawn();
                }, 1000);
                hit = true;
            }
        }

        // 子弹打鹰旗（打到基地=游戏结束）
        if (!hit) {
            const baseCol = Math.floor((b.x + b.w/2) / TILE_SIZE);
            const baseRow = Math.floor((b.y + b.h/2) / TILE_SIZE);
            if (baseRow === ROWS - 1 && (baseCol === 12 || baseCol === 13)) {
                b.alive = false;
                game.gameOver = true;
                spawnExplosion(baseCol * TILE_SIZE + TILE_SIZE/2, baseRow * TILE_SIZE + TILE_SIZE/2, '#ff0000', 40);
            }
        }
    }

    // 清理
    game.bullets = game.bullets.filter(b => b.alive);
    game.enemies = game.enemies.filter(e => e.alive);

    // 生成敌人
    if (game.enemiesSpawned < game.totalEnemies && game.enemies.length < 4) {
        game.spawnTimer++;
        if (game.spawnTimer >= game.spawnInterval) {
            game.spawnTimer = 0;
            spawnEnemyWave();
        }
    } else {
        game.spawnTimer = 0;
    }

    // 粒子更新
    for (let p of game.particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life--;
    }
    game.particles = game.particles.filter(p => p.life > 0);

    // 胜利条件
    if (game.enemiesKilled >= game.totalEnemies && game.enemies.length === 0) {
        if (game.level < 3) {
            game.level++;
            game.totalEnemies = 20 + game.level * 5;
            game.enemiesSpawned = 0;
            game.enemiesKilled = 0;
            game.map = buildMap(game.level);
            game.player = createPlayer();
            game.enemies = [];
            game.bullets = [];
            game.particles = [];
            game.spawnTimer = 0;
            spawnEnemyWave();
        } else {
            game.win = true;
        }
    }

    updateUI();
}

function updateUI() {
    scoreSpan.textContent = game.score;
    livesSpan.textContent = game.lives;
    enemiesSpan.textContent = Math.max(0, game.totalEnemies - game.enemiesKilled);
    levelSpan.textContent = game.level;
}

// ==================== 渲染 ====================
function draw() {
    ctx.clearRect(0, 0, W, H);

    // 绘制地图
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const tile = game.map[r][c];
            const x = c * TILE_SIZE, y = r * TILE_SIZE;
            if (tile === TILE_BRICK) {
                // 砖墙纹理
                ctx.fillStyle = '#cc6633';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#993311';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                // 砖纹
                ctx.strokeStyle = '#884422';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, y + TILE_SIZE/2);
                ctx.lineTo(x + TILE_SIZE, y + TILE_SIZE/2);
                ctx.moveTo(x + TILE_SIZE/2, y);
                ctx.lineTo(x + TILE_SIZE/2, y + TILE_SIZE/2);
                ctx.moveTo(x + TILE_SIZE/4, y + TILE_SIZE/2);
                ctx.lineTo(x + TILE_SIZE/4, y + TILE_SIZE);
                ctx.moveTo(x + TILE_SIZE*3/4, y + TILE_SIZE/2);
                ctx.lineTo(x + TILE_SIZE*3/4, y + TILE_SIZE);
                ctx.stroke();
            } else if (tile === TILE_STEEL) {
                ctx.fillStyle = '#aaa';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                // 铆钉
                ctx.fillStyle = '#ccc';
                ctx.beginPath();
                ctx.arc(x + 5, y + 5, 3, 0, Math.PI*2);
                ctx.arc(x + TILE_SIZE - 5, y + 5, 3, 0, Math.PI*2);
                ctx.arc(x + 5, y + TILE_SIZE - 5, 3, 0, Math.PI*2);
                ctx.arc(x + TILE_SIZE - 5, y + TILE_SIZE - 5, 3, 0, Math.PI*2);
                ctx.fill();
            } else if (tile === TILE_WATER) {
                ctx.fillStyle = '#2244aa';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                // 水波纹
                ctx.strokeStyle = '#4488cc';
                ctx.lineWidth = 1.5;
                const phase = game.frame * 0.05;
                for (let i = 0; i < 3; i++) {
                    const wy = y + 5 + i * 9;
                    ctx.beginPath();
                    for (let wx = x + 2; wx < x + TILE_SIZE - 2; wx += 2) {
                        const yy = wy + Math.sin((wx + phase) * 0.3 + i) * 2;
                        wx === x + 2 ? ctx.moveTo(wx, yy) : ctx.lineTo(wx, yy);
                    }
                    ctx.stroke();
                }
            } else if (tile === TILE_TREE) {
                ctx.fillStyle = '#226622';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // 绘制基地鹰旗 (底部中央)
    const bx = 12 * TILE_SIZE, by = (ROWS - 1) * TILE_SIZE;
    ctx.fillStyle = '#e94560';
    ctx.fillRect(bx, by, TILE_SIZE * 2, TILE_SIZE);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', bx + TILE_SIZE, by + TILE_SIZE/2);

    // 绘制敌人
    for (let e of game.enemies) {
        if (!e.alive) continue;
        drawTank(e.x, e.y, e.dir, e.color, false);
        // 血条
        if (e.hp > 1) {
            ctx.fillStyle = '#333';
            ctx.fillRect(e.x, e.y - 6, TANK_SIZE, 4);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(e.x, e.y - 6, TANK_SIZE * (e.hp / 3), 4);
        }
    }

    // 绘制玩家
    if (game.player && game.player.alive) {
        drawTank(game.player.x, game.player.y, game.player.dir, game.player.color, true);
    }

    // 绘制子弹
    for (let b of game.bullets) {
        if (!b.alive) continue;
        ctx.fillStyle = b.isPlayer ? '#ffdd44' : '#ff6644';
        ctx.shadowColor = b.isPlayer ? '#ffdd44' : '#ff6644';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(b.x + 3, b.y + 3, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // 粒子
    for (let p of game.particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // 覆盖层
    if (game.gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 52px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💀 游戏结束', W/2, H/2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.fillText('得分: ' + game.score, W/2, H/2 + 50);
    } else if (game.win) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#f5c842';
        ctx.font = 'bold 52px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🎉 胜利！', W/2, H/2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.fillText('得分: ' + game.score, W/2, H/2 + 50);
    } else if (game.paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⏸ 暂停', W/2, H/2);
    }
}

function drawTank(x, y, dir, color, isPlayer) {
    ctx.save();
    ctx.translate(x + TANK_SIZE/2, y + TANK_SIZE/2);
    ctx.rotate(dir * Math.PI / 2);

    // 履带
    ctx.fillStyle = '#444';
    ctx.fillRect(-TANK_SIZE/2, -TANK_SIZE/2, 6, TANK_SIZE);
    ctx.fillRect(TANK_SIZE/2 - 6, -TANK_SIZE/2, 6, TANK_SIZE);

    // 履带条纹
    ctx.fillStyle = '#555';
    const stripeCount = 7;
    for (let i = 0; i < stripeCount; i++) {
        const sy = -TANK_SIZE/2 + 2 + i * (TANK_SIZE / stripeCount);
        ctx.fillRect(-TANK_SIZE/2 + 1, sy, 4, 2);
        ctx.fillRect(TANK_SIZE/2 - 5, sy, 4, 2);
    }

    // 车身
    ctx.fillStyle = color;
    ctx.fillRect(-TANK_SIZE/2 + 5, -TANK_SIZE/2 + 3, TANK_SIZE - 10, TANK_SIZE - 6);

    // 车身细节
    ctx.fillStyle = shadeColor(color, -30);
    ctx.fillRect(-TANK_SIZE/2 + 7, -TANK_SIZE/2 + 5, TANK_SIZE - 14, TANK_SIZE - 10);

    // 炮塔 (圆形)
    ctx.fillStyle = shadeColor(color, -20);
    ctx.beginPath();
    ctx.arc(0, 0, TANK_SIZE/2 - 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = shadeColor(color, -40);
    ctx.beginPath();
    ctx.arc(0, 0, TANK_SIZE/2 - 9, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = '#666';
    ctx.fillRect(-3, -TANK_SIZE/2 + 2, 6, TANK_SIZE/2 - 2);
    ctx.fillStyle = '#888';
    ctx.fillRect(-2, -TANK_SIZE/2 + 1, 4, TANK_SIZE/2 - 3);

    // 玩家标识
    if (isPlayer) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#', ''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, Math.max(0, (num >> 16) + amt));
    const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amt));
    const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// ==================== 输入处理 ====================
const keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'p' || e.key === 'P') {
        if (!game.gameOver && !game.win) game.paused = !game.paused;
    }
    if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

function handleInput() {
    if (!game.player || !game.player.alive || game.paused || game.gameOver || game.win) return;

    let moved = false;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        game.player.dir = DIR.UP;
        const newY = game.player.y - game.player.speed;
        moved = tryMove(game.player, game.player.x, newY);
    } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        game.player.dir = DIR.DOWN;
        const newY = game.player.y + game.player.speed;
        moved = tryMove(game.player, game.player.x, newY);
    } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        game.player.dir = DIR.LEFT;
        const newX = game.player.x - game.player.speed;
        moved = tryMove(game.player, newX, game.player.y);
    } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        game.player.dir = DIR.RIGHT;
        const newX = game.player.x + game.player.speed;
        moved = tryMove(game.player, newX, game.player.y);
    }

    if (keys[' '] && game.player.shootCooldown <= 0) {
        fireBullet(game.player);
        game.player.shootCooldown = game.player.shootDelay;
    }
}

// ==================== 游戏循环 ====================
function gameLoop() {
    handleInput();
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ==================== 重新开始 ====================
document.getElementById('restartBtn').addEventListener('click', () => {
    initGame();
    updateUI();
});

// ==================== 启动 ====================
initGame();
updateUI();
gameLoop();
</script>
